<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Orbit — Productivity Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#7C6CFF;
    --bg:#0A0C16;
    --surface:rgba(255,255,255,0.03);
    --surface-strong:rgba(255,255,255,0.065);
    --border:rgba(255,255,255,0.08);
    --text:#F1F2FA;
    --muted:#8E92AC;
    --danger:#FB7185;
    --success:#34D399;
    --warning:#F5A623;
    --info:#22D3EE;
  }
  [data-theme="light"]{
    --bg:#F3F4FA;
    --surface:rgba(255,255,255,0.55);
    --surface-strong:rgba(255,255,255,0.8);
    --border:rgba(20,20,40,0.08);
    --text:#14151F;
    --muted:#6B6E85;
  }
  body{background-image:radial-gradient(circle at 15% 0%,rgba(124,108,255,0.10),transparent 45%),radial-gradient(circle at 85% 20%,rgba(34,211,238,0.06),transparent 40%);background-attachment:fixed;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
  html,body{margin:0;padding:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;overflow-x:hidden;}
  button,a,[data-action],.card,.nav-btn,.day-chip,.habit-day,.tab-item,.icon-btn,input,textarea,select{-webkit-tap-highlight-color:transparent;outline:none;}
  button:focus,a:focus,[data-action]:focus,.card:focus,.nav-btn:focus,.day-chip:focus,.habit-day:focus,.tab-item:focus,.icon-btn:focus{outline:none;}
  button:focus-visible,a:focus-visible,[data-action]:focus-visible,.nav-btn:focus-visible,.day-chip:focus-visible,.icon-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .font-display{font-family:'Space Grotesk',sans-serif;}
  .font-mono{font-family:'JetBrains Mono',monospace;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;transition:all 0.2s;}
  button:hover{opacity:0.9;}
  button:active{transform:scale(0.97);}
  input,textarea,select{font-family:inherit;}
  .app-shell{min-height:100vh;display:flex;}
  .glass{background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
  .glass-strong{background:var(--surface-strong);border:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
  .card{border-radius:20px;padding:20px;transition:all 0.3s;position:relative;overflow:hidden;background-image:linear-gradient(160deg,rgba(255,255,255,0.06),rgba(255,255,255,0) 40%);}
  .card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.2);}
  .compact .card{padding:14px;}
  .icon{display:inline-flex;vertical-align:middle;}
  .row{display:flex;align-items:center;}
  .between{justify-content:space-between;}
  .center{justify-content:center;align-items:center;}
  .gap-1{gap:4px;} .gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;}
  .muted{color:var(--muted);}
  .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* Login */
  .login-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg),var(--accent)22);padding:20px;}
  .login-card{background:var(--surface-strong);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:440px;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp 0.5s;}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn .25s both;}
  .login-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:15px;color:var(--text);outline:none;}
  .login-input:focus{border-color:var(--accent);}
  .login-btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;background:var(--accent);color:#fff;}

  /* Sidebar */
  #sidebar{position:fixed;top:0;left:0;bottom:0;width:236px;flex-shrink:0;border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;z-index:35;background:var(--bg);}
  .brand{display:flex;align-items:center;gap:8px;padding:0 8px;margin-bottom:24px;}
  .brand-mark{width:32px;height:32px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#0A0C16;background:var(--accent);}
  .nav-btn{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:500;color:var(--muted);border-left:2px solid transparent;text-align:left;width:100%;}
  .nav-btn.active{background:var(--surface-strong);color:var(--text);border-left:2px solid var(--accent);}
  .nav-btn svg{color:var(--muted);}
  .nav-btn.active svg{color:var(--accent);}

  /* Mobile nav */
  #mobileNavOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none;}
  #mobileNav{position:fixed;top:0;left:0;bottom:0;width:260px;z-index:50;padding:24px 16px;display:flex;flex-direction:column;gap:4px;transform:translateX(-280px);transition:transform .25s;}
  #mobileNav.open{transform:translateX(0);}
  #mobileNavOverlay.open{display:block;}

  /* Header */
  header{position:fixed;top:0;left:236px;right:0;z-index:30;padding:12px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:rgba(10,12,22,0.42)!important;backdrop-filter:blur(24px) saturate(170%);-webkit-backdrop-filter:blur(24px) saturate(170%);transition:background .3s,box-shadow .25s,border-color .25s,left .25s;}
  [data-theme="light"] header{background:rgba(243,244,250,0.5)!important;}
  header.is-scrolled{box-shadow:0 8px 24px rgba(0,0,0,0.25);border-bottom-color:var(--accent)33;}
  .search-box{flex:1;max-width:420px;display:flex;align-items:center;gap:8px;border-radius:999px;padding:9px 14px;margin:0 16px;}
  .search-box input{background:transparent;border:none;outline:none;color:var(--text);font-size:14px;width:100%;}
  .pill{border-radius:999px;padding:6px 14px;font-size:13px;font-weight:500;}
  .icon-btn{width:36px;height:36px;border-radius:999px;display:flex;align-items:center;justify-content:center;}
  .avatar{width:36px;height:36px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;}

  /* Main */
  .content-col{margin-left:236px;min-width:0;display:flex;flex-direction:column;flex:1;transition:margin-left .25s;}
  main{flex:1;min-width:0;padding:88px 24px 100px;}
  .compact main{padding:80px 24px 90px;}

  /* Mobile tab bar */
  #mobileTabBar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;padding:8px 0;align-items:center;justify-content:space-around;border-top:1px solid var(--border);}
  .tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;font-size:10px;}

  /* FAB */
  #fab{position:fixed;bottom:100px;right:24px;z-index:50;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#0A0C16;display:none;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(124,108,255,0.4);cursor:pointer;font-size:24px;transition:all 0.3s;}
  #fab:hover{transform:scale(1.1);box-shadow:0 12px 32px rgba(124,108,255,0.6);}

  /* Toast */
  .toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:60;padding:10px 18px;border-radius:999px;font-size:13px;display:flex;align-items:center;gap:8px;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;}
  .toast.show{opacity:1;bottom:88px;}
  @media(min-width:881px){.toast{bottom:24px;}.toast.show{bottom:40px;}}

  /* Grid */
  .grid{display:grid;gap:16px;}
  .g-2{grid-template-columns:repeat(2,1fr);}
  .g-4{grid-template-columns:repeat(4,1fr);}
  .g-3{grid-template-columns:repeat(3,1fr);}
  .g-7{grid-template-columns:repeat(7,1fr);}
  .g-planner{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));}
  @media(max-width:1024px){.g-4{grid-template-columns:repeat(2,1fr);}.g-3{grid-template-columns:repeat(1,1fr);}.g-7{grid-template-columns:repeat(4,1fr);}}
  @media(max-width:640px){.g-7{grid-template-columns:repeat(1,1fr);}.g-2{grid-template-columns:repeat(1,1fr);}}
  @media(max-width:880px){#dashSplit,.dash-split-2{grid-template-columns:1fr!important;}}
  .span-2{grid-column:span 2;}

  /* Form elements */
  input[type=text],textarea,select{width:100%;background:var(--surface);border:1px solid var(--border);outline:none;border-radius:12px;padding:10px 14px;font-size:13px;color:var(--text);}
  textarea{resize:vertical;min-height:60px;}
  select{appearance:none;-webkit-appearance:none;cursor:pointer;}
  .btn-accent{display:flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;padding:10px 16px;font-size:13px;font-weight:600;color:#0A0C16;background:var(--accent);white-space:nowrap;}
  .btn-danger{background:var(--danger);color:#fff;padding:8px 16px;border-radius:12px;font-size:13px;}

  /* Ring */
  .ring-label{font-weight:700;font-family:'JetBrains Mono',monospace;}
  
  /* Habit day */
  .habit-day{display:flex;flex-direction:column;align-items:center;gap:4px;border-radius:10px;padding:6px 0;cursor:pointer;transition:all 0.2s;}
  .habit-day:hover{transform:scale(1.05);}
  
  /* Heatmap */
  table.heat{width:100%;border-collapse:collapse;font-size:13px;min-width:520px;}
  table.heat th{font-weight:400;font-size:11px;color:var(--muted);padding-bottom:8px;text-align:center;}
  table.heat th:first-child{text-align:left;}
  table.heat td{padding:4px 0;text-align:center;}
  .heat-cell{width:22px;height:22px;border-radius:6px;margin:0 auto;transition:all 0.2s;}
  .heat-cell:hover{transform:scale(1.3);}

  /* Dashboard: bar chart */
  .bar-chart-row{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:8px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;}
  .bar-track{position:relative;width:100%;max-width:28px;flex:1;border-radius:8px;background:var(--surface-strong);overflow:hidden;}
  .bar-fill{position:absolute;bottom:0;left:0;width:100%;border-radius:8px;transition:height .6s cubic-bezier(.2,.8,.2,1);}

  /* Dashboard: donut legend */
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .legend-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;}

  /* Dashboard: goals in motion */
  .goals-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;}
  .goal-mini{flex:0 0 220px;border-radius:16px;padding:16px;background:var(--surface-strong);border:1px solid var(--border);}
  .goal-mini .progress-track{height:5px;border-radius:6px;background:var(--border);margin-top:12px;overflow:hidden;}
  .goal-mini .progress-fill{height:100%;border-radius:6px;transition:width .6s;}

  /* Dashboard: trend chart */
  .trend-dot{fill:var(--bg);stroke-width:2.5;}

  /* Task row */
  .task-row{display:flex;align-items:center;gap:8px;border-radius:10px;padding:8px 12px;background:var(--surface-strong);margin-bottom:6px;cursor:grab;transition:all 0.2s;}
  .task-row:active{cursor:grabbing;}
  .task-row.dragging{opacity:0.4;}
  .task-text{flex:1;min-width:0;font-size:13px;}
  .badge{font-size:9px;padding:2px 8px;border-radius:999px;flex-shrink:0;font-weight:500;}

  /* Range */
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;background:var(--border);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;}

  /* Switch */
  .switch{width:40px;height:24px;border-radius:999px;position:relative;transition:background .15s;flex-shrink:0;cursor:pointer;}
  .switch-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:4px;left:4px;transition:left .15s;}

  /* Chips */
  .day-chip{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:500;flex-shrink:0;cursor:pointer;transition:all 0.2s;}
  .day-chip:hover{transform:scale(1.05);}
  .swatch{width:28px;height:28px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:all 0.2s;}
  .swatch:hover{transform:scale(1.2);}

  /* Progress tabs */
  .progress-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border-radius:12px;padding:4px;}
  .progress-tab{flex:1;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;transition:all 0.2s;}
  .progress-tab.active{background:var(--accent);color:#0A0C16;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn 0.3s;}
  .modal{background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:24px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,0.3);}

  /* Edit panel */
  .edit-panel{background:var(--surface-strong);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:12px;}
  
  /* Week selector */
  .week-selector{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;}
  .week-chip{padding:8px 12px;border-radius:8px;font-size:12px;white-space:nowrap;cursor:pointer;background:var(--surface);transition:all 0.2s;}
  .week-chip.active{background:var(--accent);color:#0A0C16;}

  /* Kbd */
  .kbd{background:var(--surface-strong);border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;}

  /* Overdue */
  .overdue{color:var(--danger);}
  .overdue-bg{background:var(--danger)15 !important;}

  /* Recurring badge */
  .recurring-badge{font-size:8px;padding:1px 5px;border-radius:999px;background:var(--accent)33;color:var(--accent);}

  /* Mini calendar (Dashboard) */
  .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .mini-cal-dow{text-align:center;font-size:10px;color:var(--muted);padding-bottom:4px;}
  .mini-cal-cell{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:12px;background:var(--surface-strong);}
  .mini-cal-cell.empty{background:transparent;}
  .mini-cal-cell.today{background:var(--accent);color:#0A0C16;font-weight:700;}
  .mini-cal-cell .dot{position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent);}
  .mini-cal-cell.today .dot{background:#0A0C16;}

  /* Timetable builder */
  .preset-card{border-radius:16px;padding:14px;background:var(--surface-strong);border:1px solid var(--border);cursor:pointer;transition:all .2s;flex:0 0 150px;}
  .preset-card:hover{transform:translateY(-2px);}
  .preset-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)33;}
  .block-row{display:flex;align-items:center;gap:10px;border-radius:12px;padding:10px 12px;background:var(--surface-strong);margin-bottom:8px;flex-wrap:wrap;}
  .block-day-toggle{width:26px;height:26px;border-radius:8px;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--surface);color:var(--muted);flex-shrink:0;}
  .block-day-toggle.on{background:var(--accent);color:#0A0C16;}

  /* ---- Enhanced motion & depth ---- */
  .card{transform:translateY(0);transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s,background .3s;}
  .card:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,0,0,0.28);}
  .nav-btn{transition:all .2s;}
  .nav-btn:hover{background:var(--surface);color:var(--text);}
  .btn-accent,.btn-danger{transition:transform .18s,box-shadow .18s,opacity .18s;}
  .btn-accent:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(124,108,255,0.35);}
  .stagger>*{animation:fadeIn .4s both;}
  .stagger>*:nth-child(1){animation-delay:.02s;} .stagger>*:nth-child(2){animation-delay:.06s;}
  .stagger>*:nth-child(3){animation-delay:.1s;} .stagger>*:nth-child(4){animation-delay:.14s;}
  .stagger>*:nth-child(5){animation-delay:.18s;} .stagger>*:nth-child(6){animation-delay:.22s;}
  .stagger>*:nth-child(n+7){animation-delay:.26s;}
  .task-row,.habit-day{transition:background .25s,transform .2s;}
  input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent)22;}
  .glass-strong{transition:backdrop-filter .3s,background .3s;}
  .modal{animation:slideUp .3s;}

  /* Drag & drop */
  [draggable="true"]{cursor:grab;}
  .drag-over{outline:2px dashed var(--accent);outline-offset:2px;border-radius:16px;}
  .task-row.dragging,.card.dragging{opacity:.35;}

  /* Global search */
  .search-box{position:relative;}
  #searchResults{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:14px;box-shadow:0 20px 48px rgba(0,0,0,0.35);max-height:360px;overflow-y:auto;z-index:80;display:none;}
  #searchResults.show{display:block;animation:fadeIn .18s;}
  .search-result{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
  .search-result:last-child{border-bottom:none;}
  .search-result:hover{background:var(--surface-strong);}
  .search-result .sr-tag{margin-left:auto;font-size:9px;padding:2px 8px;border-radius:999px;background:var(--surface-strong);color:var(--muted);flex-shrink:0;}
  .search-empty{padding:16px;text-align:center;font-size:12px;color:var(--muted);}
  #mobileSearchOverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;display:none;padding:16px;}
  #mobileSearchOverlay.open{display:block;}
  #mobileSearchBox{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:12px;margin-top:8px;}

  /* Password toggle */
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:44px;}
  .pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;}

  /* Badge unlock celebration */
  @keyframes badgePulse{0%{box-shadow:0 0 0 0 var(--accent)55;}70%{box-shadow:0 0 0 14px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
  .badge-new{animation:badgePulse 1.6s ease-out 2;}

  /* Backup banner */
  .backup-banner{border-radius:14px;padding:12px 16px;background:linear-gradient(135deg,var(--warning)18,var(--surface-strong));border:1px solid var(--warning)44;font-size:12px;display:flex;align-items:center;gap:10px;}

  /* Responsive */
  @media(max-width:880px){
    #sidebar{display:none;}
    header{left:0;}
    .content-col{margin-left:0;}
    #mobileTabBar{display:flex;}
    #fab{display:flex;}
    header .search-box{display:none;}
    header .brand-text,header .qa-btn{display:none;}
  }
  @media(min-width:881px){
    .mobile-only{display:none!important;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ===================== Auth System ===================== */
const USERS_KEY="orbit-users",CURRENT_USER_KEY="orbit-current-user";
function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY))||{};}catch(e){return{};}}
function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u));}
function getCurrentUser(){try{return JSON.parse(localStorage.getItem(CURRENT_USER_KEY));}catch(e){return null;}}
function setCurrentUser(u){u?localStorage.setItem(CURRENT_USER_KEY,JSON.stringify({email:u.email,name:u.name})):localStorage.removeItem(CURRENT_USER_KEY);}
function hashPassword(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h=h&h;}return'orb_'+Math.abs(h).toString(36);}
const ACCOUNT_RECOVERY_DAYS=30;
function purgeExpiredDeletedAccounts(){
  const users=getUsers();let changed=false;
  Object.keys(users).forEach(email=>{
    const u=users[email];
    if(u&&u.deleted&&u.deletedAt){
      const days=(Date.now()-new Date(u.deletedAt).getTime())/86400000;
      if(days>ACCOUNT_RECOVERY_DAYS){delete users[email];changed=true;}
    }
  });
  if(changed)saveUsers(users);
}
function createAccount(email,name,password){
  const users=getUsers();
  if(users[email]&&!users[email].deleted)return{success:false,error:'Account exists'};
  users[email]={email,name,password:hashPassword(password),createdAt:new Date().toISOString(),data:createFreshUserData()};
  saveUsers(users);return{success:true};
}
function login(email,password){

let history=[],historyIndex=-1;
const MAX_HISTORY=30;
function saveHistory(){
  history=history.slice(0,historyIndex+1);
  history.push(JSON.parse(JSON.stringify(getStateData())));
  if(history.length>MAX_HISTORY)history.shift();
  historyIndex=history.length-1;
}
function undo(){
  if(historyIndex>0){historyIndex--;restoreState(JSON.parse(JSON.stringify(history[historyIndex])));showToast("↩ Undo");}
}
function redo(){
  if(historyIndex<history.length-1){historyIndex++;restoreState(JSON.parse(JSON.stringify(history[historyIndex])));showToast("↪ Redo");}
}
function restoreState(data){
  Object.assign(state,data);persist();render();
}

function goalProgress(g){
  // Goal completion is driven by milestones whenever a goal has any: progress is
  // simply the % of milestones checked off. Goals with no milestones fall back to
  // their manually-set progress value.
  if(g.milestones&&g.milestones.length)return Math.round(g.milestones.filter(m=>m.done).length/g.milestones.length*100);
  return g.progress||0;
}

/* ===================== Week Helpers ===================== */
function getWeekKey(date=new Date()){
  const jan1=new Date(date.getFullYear(),0,1);
  return`${date.getFullYear()}-W${String(Math.ceil(((date-jan1)/86400000+jan1.getDay()+1)/7)).padStart(2,'0')}`;
}
function getCurrentWeekKey(){return getWeekKey();}
// Weeks are ordered chronologically starting from when the account (or the
// earliest journal entry) was created, and always extend through to the
// current week — the list simply keeps growing week over week, with no
// artificial cutoff.
function getAccountCreatedDate(){
  const cu=getCurrentUser();
  if(cu){const users=getUsers();const rec=users[cu.email];if(rec&&rec.createdAt){const d=new Date(rec.createdAt);if(!isNaN(d))return d;}}
  const existingWeekly=Object.keys((state&&state.weeklyJournals)||{});
  const existingDaily=Object.keys((state&&state.dailyJournals)||{});
  if(existingDaily.length){const d=new Date(existingDaily.sort()[0]);if(!isNaN(d))return d;}
  if(existingWeekly.length){
    const [y,w]=existingWeekly.sort()[0].split("-W").map(Number);
    if(y&&w)return new Date(y,0,1+(w-1)*7);
  }
  return new Date(new Date().getFullYear(),0,1);
}
function getWeekKeys(){
  const start=getAccountCreatedDate(),now=new Date();
  const keys=[];
  const cursor=new Date(start.getFullYear(),start.getMonth(),start.getDate());
  let guard=0;
  while(cursor<=now&&guard<5200){ // guard = 100 years of weeks, just a safety valve
    const k=getWeekKey(cursor);
    if(!keys.includes(k))keys.push(k);
    cursor.setDate(cursor.getDate()+7);
    guard++;
  }
  const nowKey=getWeekKey(now);
  if(!keys.includes(nowKey))keys.push(nowKey);
  return keys;
}

/* ===================== Progress System ===================== */
function calculateWeekStats(){
  if(!state)return{};
  const totalTasks=DAYS.reduce((s,d)=>s+(state.weekTasks[d]||[]).length,0);
  const doneTasks=DAYS.reduce((s,d)=>s+(state.weekTasks[d]||[]).filter(t=>t.done).length,0);
  const habitCompletions=state.habits.reduce((s,h)=>s+DAYS.filter(d=>h.done[d]).length,0);
  const totalHabitSlots=state.habits.length*7;
  const goalsProgress=state.goals.length?Math.round(state.goals.reduce((s,g)=>s+goalProgress(g),0)/state.goals.length):0;
  return{totalTasks,doneTasks,completionRate:totalTasks?Math.round(doneTasks/totalTasks*100):0,habitRate:totalHabitSlots?Math.round(habitCompletions/totalHabitSlots*100):0,goalsProgress,xp:state.xp||0};
}
function saveWeeklyProgress(){
  if(!state)return;
  const stats=calculateWeekStats(),wk=getCurrentWeekKey();
  if(!state.weeklyHistory)state.weeklyHistory=[];
  const ex=state.weeklyHistory.find(w=>w.key===wk);
  if(ex)Object.assign(ex,stats);else state.weeklyHistory.push({key:wk,...stats});
  if(state.weeklyHistory.length>52)state.weeklyHistory=state.weeklyHistory.slice(-52);
}
// Detects when a new calendar week has started and refreshes the Planner:
// the just-finished week's stats are archived into weeklyHistory, then every
// task's "done" checkbox is cleared so the weekday grid starts fresh. Tasks
// themselves (recurring or one-off) are kept — only completion state resets.
function checkWeekRollover(){
  if(!state)return;
  const wk=getCurrentWeekKey();
  if(!state.plannerWeekKey){state.plannerWeekKey=wk;return;} // first load after upgrade: adopt current week, don't touch existing data
  if(state.plannerWeekKey===wk)return; // still the same week, nothing to do
  const stats=calculateWeekStats();
  if(!state.weeklyHistory)state.weeklyHistory=[];
  const ex=state.weeklyHistory.find(w=>w.key===state.plannerWeekKey);
  if(ex)Object.assign(ex,stats);else state.weeklyHistory.push({key:state.plannerWeekKey,...stats});
  if(state.weeklyHistory.length>52)state.weeklyHistory=state.weeklyHistory.slice(-52);
  DAYS.forEach(d=>{(state.weekTasks[d]||[]).forEach(t=>{t.done=false;});});
  state.plannerWeekKey=wk;
  persist();
}

function monthCalendarCard(){
  const accent=state.accent;
  const now=new Date();
  const year=now.getFullYear(),month=now.getMonth();
  const firstDay=new Date(year,month,1);

  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthLabel=now.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  // Mark days that have any task due (across all planner days/dates) or that are "today".
  const busyDates=new Set();
  DAYS.forEach(d=>(state.weekTasks[d]||[]).forEach(t=>{if(t.dueDate)busyDates.add(t.dueDate);}));
  const cells=[];
  for(let i=0;i<startOffset;i++)cells.push(`<div class="mini-cal-cell empty"></div>`);
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=day===now.getDate();
    cells.push(`<div class="mini-cal-cell ${isToday?'today':''}">${day}${busyDates.has(dateStr)?'<span class="dot"></span>':''}</div>`);
  }
  return card(`${sectionTitle(monthLabel,"calendar",accent)}<div class="mini-cal-grid" style="margin-bottom:6px;">${["M","T","W","T","F","S","S"].map(d=>`<div class="mini-cal-dow">${d}</div>`).join("")}</div><div class="mini-cal-grid">${cells.join("")}</div>`);
}

function sparkline(values,color,width,height){
  width=width||100;height=height||100;
  if(!values.length)return`<div class="muted" style="font-size:12px;text-align:center;padding:24px 0;">Not enough history yet — check back after a few weeks.</div>`;
  const max=Math.max(100,...values),min=0;
  const stepX=values.length>1?width/(values.length-1):0;
  const pts=values.map((v,i)=>{const x=i*stepX;const y=height-((v-min)/(max-min||1))*height;return`${x.toFixed(1)},${y.toFixed(1)}`;}).join(" ");
  const areaPts=`0,${height} ${pts} ${width},${height}`;
  const gid="spark"+Math.random().toString(36).slice(2,8);
  return`<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" preserveAspectRatio="none" style="display:block;overflow:visible;">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.35"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${areaPts}" fill="url(#${gid})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function trendChartWithDots(values,color,width,height){
  width=width||600;height=height||140;
  const max=Math.max(20,...values),min=0;
  const stepX=values.length>1?width/(values.length-1):0;
  const pad=6;
  const pts=values.map((v,i)=>{const x=i*stepX;const y=pad+(height-pad*2)-((v-min)/(max-min||1))*(height-pad*2);return{x,y};});
  const line=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const areaPts=`${pad},${height} ${line} ${width-pad},${height}`;
  const gid="trend"+Math.random().toString(36).slice(2,8);
  return`<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" preserveAspectRatio="none" style="display:block;overflow:visible;">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${areaPts}" fill="url(#${gid})"/>
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle class="trend-dot" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5" fill="${color}" stroke="var(--bg)"/>`).join("")}
  </svg>`;
}
function weeklyTrendPoints(){
  return DAYS.map(d=>{
    const tasks=state.weekTasks[d]||[];
    const taskPct=tasks.length?(tasks.filter(t=>t.done).length/tasks.length*100):0;

    const habitPct=habitsTotal?(state.habits.filter(h=>h.done[d]).length/habitsTotal*100):0;
    return Math.round((taskPct+habitPct)/2);

const REWARD_LADDER=[[0,"Getting started"],[100,"Bronze badge"],[250,"Silver badge"],[400,"New hoodie"],[600,"Gold trophy"],[1000,"Legend status"],[1600,"Elite tier"],[2400,"Champion crown"],[3500,"Grandmaster relic"],[5000,"Mythic ascension"],[7500,"Immortal legacy"]];
function currentReward(){
  let r=REWARD_LADDER[0][1];
  for(const[xp,name]of REWARD_LADDER){if((state.xp||0)>=xp)r=name;}
  return r;
}
// Leveling curve: each level requires progressively more XP than the last, so there's
// always a next level to chase and it takes a bit more dedication as you climb.
const LEVEL_TITLES=["Novice","Beginner","Rising Star","Achiever","Specialist","Expert","Veteran","Master","Grandmaster","Legend","Mythic"];
function xpForLevel(level){ // total cumulative XP needed to REACH this level
  let total=0;
  for(let l=1;l<level;l++)total+=Math.round(150*Math.pow(l,1.28));
  return total;
}
function levelFromXp(xp){
  let level=1;
  while(xpForLevel(level+1)<=xp&&level<500)level++;
  const curFloor=xpForLevel(level),nextFloor=xpForLevel(level+1);
  const span=Math.max(1,nextFloor-curFloor);
  const progressPct=Math.min(100,Math.round(((xp-curFloor)/span)*100));
  const title=LEVEL_TITLES[Math.min(LEVEL_TITLES.length-1,Math.floor((level-1)/3))]+(level>LEVEL_TITLES.length*3?` +${level}`:"");
  return{level,title,progressPct,xpIntoLevel:xp-curFloor,xpForNext:span,nextFloor};
}
// Long-term consistency pays off: the better your best current habit streak, the more
// XP every action earns, up to +100% at a 50-day streak. This is what makes staying
// consistent over time genuinely more effective, not just linearly rewarded.
function xpMultiplier(){
  const streak=state?bestStreak():0;
  return 1+Math.min(1,streak*0.02);
}
function categorySplit(){
  const counts={};
  DAYS.forEach(d=>{(state.weekTasks[d]||[]).forEach(t=>{counts[t.tag]=(counts[t.tag]||0)+1;});});
  return Object.entries(counts).filter(([,c])=>c>0);
}
const CATEGORY_COLORS={Personal:"#34D399",Work:"#22D3EE",Health:"#7C6CFF",Study:"#F5A623",Errands:"#FB7185"};
function donutChart(segments,size,stroke){
  size=size||150;stroke=stroke||20;
  const total=segments.reduce((a,[,v])=>a+v,0)||1;
  const r=(size-stroke)/2,c=2*Math.PI*r;
  let offset=0;
  const circles=segments.map(([label,val])=>{
    const frac=val/total,len=frac*c;
    const seg=`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${CATEGORY_COLORS[label]||'var(--muted)'}" stroke-width="${stroke}" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-offset}" stroke-linecap="butt"/>`;
    offset+=len;
    return seg;
  }).join("");
  return`<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0;"><svg width="${size}" height="${size}" style="transform:rotate(-90deg);"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>${circles}</svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;"><span class="font-display font-mono" style="font-size:18px;font-weight:700;">${total}</span><span class="muted" style="font-size:10px;">tasks</span></div></div>`;
}
function taskBarChart(){
  const stats=dayStats();
  const max=Math.max(1,...stats.map(s=>s.total));
  const accent=state.accent;
  return`<div class="bar-chart-row">${stats.map(s=>{

/* ===================== Focus Timer ===================== */
let focusInterval=null;
const FOCUS_MODES={focus:25*60,short:5*60,long:15*60};
function getFocusDuration(mode){
  if(state?.focus?.customDurations?.[mode])return state.focus.customDurations[mode]*60;
  return FOCUS_MODES[mode]||25*60;
}
function startFocusInterval(){
  clearInterval(focusInterval);
  focusInterval=setInterval(()=>{if(!state?.focus?.running)return;state.focus.timeLeft-=1;if(state.focus.timeLeft<=0){state.focus.timeLeft=0;state.focus.running=false;const wasFocus=state.focus.mode==="focus";if(wasFocus){state.focus.sessions.push({time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),duration:Math.round(getFocusDuration('focus')/60)});addXp(25);showToast("Focus session complete! +25 XP","success");}else{showToast("Break's over — back to it!","info");}notifyFocusDone(wasFocus);persist();}if(state.tab==="focus")updateFocusDisplay();},1000);
}
function playBeep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type="sine";o.frequency.value=740;o.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
    o.start();o.stop(ctx.currentTime+0.6);
  }catch(e){}
}
function notifyFocusDone(wasFocus){
  if(!state?.notifyEnabled)return;
  playBeep();
  if("Notification"in window&&Notification.permission==="granted"){
    try{new Notification(wasFocus?"Focus session complete 🎯":"Break's over ⏱️",{body:wasFocus?"Nice work — +25 XP earned.":"Ready for another round?"});}catch(e){}
  }
}
function updateFocusDisplay(){
  const el=document.getElementById("focusTime");if(!el)return;
  const t=state.focus.timeLeft;el.textContent=`${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;
  const maxTime=getFocusDuration(state.focus.mode);
  const pct=100-(t/maxTime)*100;
  const rw=document.getElementById("focusRingSvg");if(rw)rw.innerHTML=ring(pct,220,10,state.accent,"",true);
  const sub=document.getElementById("focusSub");if(sub)sub.textContent=state.focus.mode==="focus"?"Stay focused":"Take a breather";
}
function renderFocus(){
  const accent=state.accent;const t=state.focus.timeLeft;
  const maxTime=getFocusDuration(state.focus.mode);
  const pct=100-(t/maxTime)*100;
  return`<div class="grid" style="grid-template-columns:2fr 1fr;">${card(`<div style="display:flex;flex-direction:column;align-items:center;padding:32px 0;"><div class="row gap-2" style="margin-bottom:28px;">${[["focus","Deep work"],["short","Short break"],["long","Long break"]].map(([k,l])=>`<button class="day-chip" data-action="setFocusMode" data-mode="${k}" style="background:${state.focus.mode===k?accent:'var(--surface-strong)'};color:${state.focus.mode===k?'#0A0C16':'var(--text)'};">${l}</button>`).join("")}</div>
    <div style="position:relative;width:220px;height:220px;margin-bottom:28px;">
      <div id="focusRingSvg">${ring(pct,220,10,accent,"",true)}</div>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;">
        <span class="font-mono" id="focusTime" style="font-size:44px;font-weight:700;line-height:1;">${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}</span>
        <span class="muted" id="focusSub" style="font-size:12px;margin-top:6px;">${state.focus.mode==="focus"?"Stay focused":"Take a breather"}</span>
      </div>
    </div>
    <div class="row gap-3"><button data-action="toggleFocusRun" style="width:56px;height:56px;border-radius:50%;background:${accent};display:flex;align-items:center;justify-content:center;">${icon(state.focus.running?"pause":"play",22,"#0A0C16")}</button><button data-action="resetFocus" class="glass" style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;">${icon("rotate",19)}</button></div></div>`)}${card(`${sectionTitle("Today's sessions","timer",accent)}<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">${state.focus.sessions.length===0?`<div class="muted" style="font-size:12px;">No sessions logged yet.</div>`:state.focus.sessions.map(s=>`<div class="row between" style="font-size:12px;border-radius:10px;padding:8px 12px;background:var(--surface-strong);"><span>${s.time}</span><span class="font-mono" style="color:${accent}">${s.duration} min</span></div>`).join("")}</div>`)}</div>`;
}

/* ===================== Global Search ===================== */
function searchIndex(){
  if(!state)return[];
  const items=[];
  DAYS.forEach(d=>(state.weekTasks[d]||[]).forEach(t=>items.push({icon:"list",label:t.text,sub:`${d} · Planner`,tag:t.priority,tab:"planner",day:d})));
  state.habits.forEach(h=>items.push({icon:"flame",label:h.name,sub:"Habits",tag:`${streakOf(h)}d streak`,tab:"habits"}));
  state.goals.forEach(g=>items.push({icon:"target",label:g.title,sub:`${g.category} · Goals`,tag:`${goalProgress(g)}%`,tab:"goals"}));
  Object.entries(state.dailyJournals||{}).forEach(([k,v])=>{if(v.note||v.gratitude||v.lessons)items.push({icon:"book",label:v.note?v.note.slice(0,60):`Journal entry`,sub:`Daily · ${k}`,tag:"Journal",tab:"journal",journalDay:k});});
  Object.entries(state.weeklyJournals||{}).forEach(([k,v])=>{if(v.note||v.gratitude||v.lessons)items.push({icon:"book",label:v.note?v.note.slice(0,60):`Journal entry`,sub:`Weekly · ${k}`,tag:"Journal",tab:"journal",journalWeek:k});});
  return items;
}
function runSearch(query){
  const q=query.trim().toLowerCase();
  if(!q)return[];
  return searchIndex().filter(i=>i.label.toLowerCase().includes(q)).slice(0,8);
}
function renderSearchResults(query,mobile){
  const box=document.getElementById(mobile?"mobileSearchResults":"searchResults");
  if(!box)return;
  const q=query.trim();
  if(!q){box.classList.remove("show");box.innerHTML="";return;}
  const results=runSearch(q);
  box.innerHTML=results.length?results.map((r,i)=>`<div class="search-result" data-action="goToSearchResult" data-idx="${i}" data-mobile="${mobile?1:0}">${icon(r.icon,14,state.accent)}<div style="min-width:0;"><div class="truncate" style="font-weight:500;">${escapeHtml(r.label)}</div><div class="muted" style="font-size:11px;">${r.sub}</div></div><span class="sr-tag">${r.tag}</span></div>`).join(""):`<div class="search-empty">No matches for "${escapeHtml(q)}"</div>`;
  window._lastSearchResults=results;
  if(!mobile)box.classList.add("show");
}
function goToSearchResult(idx){
  const r=(window._lastSearchResults||[])[idx];if(!r)return;
  if(r.day)state.drafts.activeDay=r.day;
  if(r.journalDay){state.drafts.journalType="daily";state.drafts.journalDay=r.journalDay;}
  if(r.journalWeek){state.drafts.journalType="weekly";state.drafts.journalWeek=r.journalWeek;}
  setState({tab:r.tab});
  document.getElementById("mobileSearchOverlay")?.classList.remove("open");
}

/* ===================== Utils ===================== */
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

/* ===================== Export Functions ===================== */
function exportCSV(){
  let csv="Day,Task,Priority,Status,Due Date,Recurring\n";
  DAYS.forEach(d=>{(state.weekTasks[d]||[]).forEach(t=>{csv+=`${d},"${t.text}",${t.priority},${t.done?'Done':'Pending'},${t.dueDate||''},${t.recurring||''}\n`;});});
  const blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='orbit-data.csv';a.click();URL.revokeObjectURL(url);
  showToast("CSV exported!","success");
}
function exportJSON(){
  const data=getStateData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='orbit-backup.json';a.click();URL.revokeObjectURL(url);
  showToast("JSON exported!","success");
}
function triggerImportJSON(){document.getElementById("importJsonInput")?.click();}
function handleImportFile(fileInput){
  const file=fileInput.files&&fileInput.files[0];if(!file)return;
  if(!confirm("Importing will replace your current data with the backup file. Continue?")){fileInput.value="";return;}
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(typeof data!=="object"||data===null)throw new Error("Invalid file");
      const merged=Object.assign(createFreshUserData(),{tab:state.tab,drafts:{}},data);
      state=merged;saveHistory();persist();render();
      showToast("Backup restored!","success");
    }catch(err){showToast("Import failed: invalid JSON file","error");}
    fileInput.value="";
  };
  reader.readAsText(file);
}

// Actual calendar date for a given weekday name, relative to today's week.

}
function nextCustomDay(fromDay,recurringDays){
  if(!recurringDays||!recurringDays.length)return null;
  const startIdx=DAYS.indexOf(fromDay);
  for(let i=1;i<=7;i++){
    const idx=(startIdx+i)%7;
    if(recurringDays.includes(DAYS[idx]))return{day:DAYS[idx],offset:i};
  }
  return null;
}
function handleRecurringTask(task,day){
  if(!task.recurring)return;
  // Base the next occurrence on the task's own due date/schedule when it has one,
  // otherwise on the actual calendar date of the day it lived on. This way recurring
  // tasks follow real dates (daily = +1 day, weekly = +7 days, monthly = +1 month)
  // instead of just cycling to the next weekday slot. "custom" recurs only on the
  // specific weekdays the person chose (task.recurringDays).
  if(task.recurring==="custom"){
    const res=nextCustomDay(day,task.recurringDays);
    if(!res)return;
    const next=new Date(dateForDay(day));next.setDate(next.getDate()+res.offset);
    const newTask={...task,id:uid(),done:false,dueDate:next.toISOString().slice(0,10)};
    if(!state.weekTasks[res.day])state.weekTasks[res.day]=[];
    state.weekTasks[res.day].push(newTask);
    return;
  }
  const base=task.dueDate?new Date(task.dueDate+"T00:00:00"):dateForDay(day);
  const next=new Date(base);
  if(task.recurring==="daily")next.setDate(next.getDate()+1);
  else if(task.recurring==="weekly")next.setDate(next.getDate()+7);
  else if(task.recurring==="monthly")next.setMonth(next.getMonth()+1);
  else return;
  const nextDay=DAYS[(next.getDay()+6)%7]; // JS getDay(): Sun=0..Sat=6 -> our Mon-first index
  const nextDueDate=next.toISOString().slice(0,10);
  const newTask={...task,id:uid(),done:false,dueDate:nextDueDate};
  if(!state.weekTasks[nextDay])state.weekTasks[nextDay]=[];
  state.weekTasks[nextDay].push(newTask);
  task.recurring=null; // this completed instance stops recurring; the new one carries the schedule forward
}
function applyTimetableToPlanner(){
  const tt=state.timetable;if(!tt||!tt.blocks)return;
  // Clear out tasks previously generated from the timetable so re-applying syncs cleanly
  // instead of duplicating blocks every time the person hits Apply.
  DAYS.forEach(d=>{state.weekTasks[d]=(state.weekTasks[d]||[]).filter(t=>!t.fromTimetable);});
  tt.blocks.forEach(b=>{
    b.days.forEach(d=>{
      if(!state.weekTasks[d])state.weekTasks[d]=[];
      state.weekTasks[d].push({id:uid(),text:b.name,done:false,priority:b.priority,duration:b.duration,tag:b.tag,dueDate:null,recurring:null,time:b.time,fromTimetable:true});
    });
  });
}
function onKeyDown(e){
  if(e.key==="Escape"){document.getElementById("mobileNav")?.classList.remove("open");document.getElementById("mobileNavOverlay")?.classList.remove("open");document.getElementById("mobileSearchOverlay")?.classList.remove("open");document.getElementById("searchResults")?.classList.remove("show");}
  if(e.ctrlKey||e.metaKey){
    switch(e.key.toLowerCase()){
      case'k':e.preventDefault();document.getElementById("globalSearch")?.focus();break;
      case'z':e.preventDefault();if(e.shiftKey)redo();else undo();break;
      case'n':e.preventDefault();{const day=DAYS[todayIdx()];const text=prompt("Quick add task:");if(text){state.weekTasks[day].push({id:uid(),text,done:false,priority:"Medium",duration:30,tag:"Personal",dueDate:null,recurring:null});saveHistory();persist();render();}}break;
      case'1':case'2':case'3':case'4':case'5':case'6':case'7':case'8':case'9':e.preventDefault();const idx=parseInt(e.key)-1;if(NAV[idx])setState({tab:NAV[idx].id});break;
    }
  }
}
function bindDragReorder(containerId,itemAttr,onReorder){
  const container=document.getElementById(containerId);if(!container)return;
  let dragEl=null;
  container.querySelectorAll(`[${itemAttr}]`).forEach(item=>{
    item.addEventListener("dragstart",()=>{dragEl=item;setTimeout(()=>item.classList.add("dragging"),0);});
    item.addEventListener("dragend",()=>{item.classList.remove("dragging");container.querySelectorAll(".drag-over").forEach(x=>x.classList.remove("drag-over"));});
    item.addEventListener("dragover",e=>{e.preventDefault();if(item!==dragEl)item.classList.add("drag-over");});
    item.addEventListener("dragleave",()=>item.classList.remove("drag-over"));
    item.addEventListener("drop",e=>{
      e.preventDefault();item.classList.remove("drag-over");
      if(!dragEl||dragEl===item)return;
      const fromId=dragEl.getAttribute(itemAttr),toId=item.getAttribute(itemAttr);
      onReorder(fromId,toId);
    });
  });
}
function reorderById(arr,fromId,toId){
  const fromIdx=arr.findIndex(x=>x.id===fromId),toIdx=arr.findIndex(x=>x.id===toId);
  if(fromIdx<0||toIdx<0)return arr;
  const [moved]=arr.splice(fromIdx,1);arr.splice(toIdx,0,moved);return arr;
}
function bindTabEvents(){
  if(state.tab==="habits")bindDragReorder("habitsList","data-habit-id",(fromId,toId)=>{reorderById(state.habits,fromId,toId);saveHistory();persist();render();showToast("Habit reordered","info");});
  DAYS.forEach(d=>{const reorder=(fromId,toId)=>{reorderById(state.weekTasks[d],fromId,toId);saveHistory();persist();render();};bindDragReorder(`tasksList-${d}`,"data-task-id",reorder);bindDragReorder(`tasksList-${d}-m`,"data-task-id",reorder);});
  const gs=document.getElementById("globalSearch");
  if(gs){gs.addEventListener("input",e=>renderSearchResults(e.target.value,false));gs.addEventListener("focus",e=>{if(e.target.value)renderSearchResults(e.target.value,false);});}
  const mgs=document.getElementById("mobileGlobalSearch");
  if(mgs)mgs.addEventListener("input",e=>renderSearchResults(e.target.value,true));
  const hi=document.getElementById("newHabitInput");if(hi)hi.addEventListener("input",e=>{state.drafts.newHabit=e.target.value;persist();});
  const gi=document.getElementById("newGoalInput");if(gi)gi.addEventListener("input",e=>{state.drafts.newGoal=e.target.value;persist();});
  document.querySelectorAll(".day-draft").forEach(inp=>{inp.addEventListener("input",e=>{state.drafts[inp.dataset.day]=e.target.value;persist();});inp.addEventListener("keydown",e=>{if(e.key==="Enter"){document.querySelector(`[data-action="addTask"][data-day="${inp.dataset.day}"]`)?.click();}});});
  document.querySelectorAll(".goal-range").forEach(r=>{r.addEventListener("input",e=>{const g=state.goals.find(g=>g.id===r.dataset.id);if(g){g.progress=+e.target.value;document.getElementById("goal-progress-"+r.dataset.id).textContent=g.progress+"% complete";persist();}});});
  if(state.tab==="focus"){startFocusInterval();updateFocusDisplay();}
  if(state.tab==="journal"){document.querySelector(".week-chip.active")?.scrollIntoView({inline:"center",block:"nearest"});}
}

/* ===================== Init ===================== */
function init(){
  purgeExpiredDeletedAccounts();
  bindGlobalEvents();
  const cu=getCurrentUser();
  if(cu){state=loadUserData();if(!state)state=createFreshUserData();history=[];historyIndex=-1;saveHistory();render();}
  else{state=null;renderLoginPage();}
  startFocusInterval();
}
init();
